<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Dashboard reveal — good (multi-animation)</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  /* MULTI-ANIMATION (good): 3 KPI tile fade-up stagger + 3 counter ramps + 5 chart bars rise.
     All concurrent, properly orchestrated. */
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 24px; }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px;
    opacity: 0; transform: translateY(16px);
    animation: rise .55s cubic-bezier(.16,1,.3,1) forwards;
  }
  .kpi:nth-child(1) { animation-delay: 0ms; }
  .kpi:nth-child(2) { animation-delay: 100ms; }
  .kpi:nth-child(3) { animation-delay: 200ms; }
  .kpi .l { color: var(--dim); font-size: 12.5px; text-transform: uppercase; letter-spacing: .12em; }
  .kpi .v { font-size: 32px; font-weight: 700; margin: 6px 0 4px; }
  .chart { margin-top: 24px; height: 180px; display: flex; align-items: flex-end; gap: 16px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  .bar { flex: 1; background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-radius: 6px 6px 0 0; transform-origin: bottom; transform: scaleY(0); animation: barUp .8s cubic-bezier(.16,1,.3,1) forwards; }
  .bar:nth-child(1) { animation-delay: 300ms; height: 70%; }
  .bar:nth-child(2) { animation-delay: 380ms; height: 90%; }
  .bar:nth-child(3) { animation-delay: 460ms; height: 50%; }
  .bar:nth-child(4) { animation-delay: 540ms; height: 80%; }
  .bar:nth-child(5) { animation-delay: 620ms; height: 65%; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes barUp { to { transform: scaleY(1); } }
</style></head>
<body><main class="frame">
  <h1>Operations dashboard</h1>
  <p class="muted">3 KPI tiles fade-up stagger + 3 counter ramps + 5 chart bars rise.</p>
  <div class="kpis">
    <div class="kpi"><div class="l">Reviews</div><div class="v" data-target="248">0</div></div>
    <div class="kpi"><div class="l">Score</div><div class="v" data-target="92">0</div></div>
    <div class="kpi"><div class="l">MRR</div><div class="v" data-target="14820" data-prefix="$">$0</div></div>
  </div>
  <div class="chart">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <script>
    function ramp(el) {
      const target = Number(el.dataset.target);
      const prefix = el.dataset.prefix ?? '';
      const t0 = performance.now();
      const dur = 1100;
      function tick(now) {
        const t = Math.min(1, (now - t0) / dur);
        const eased = 1 - Math.pow(1 - t, 3);
        el.textContent = prefix + Math.round(target * eased).toLocaleString();
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
    document.querySelectorAll('[data-target]').forEach(ramp);
  </script>
</main></body></html>
