<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Hover state — good</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  .target {
    display: inline-block; padding: 16px 28px; margin-top: 40px;
    background: var(--accent); color: #fff; border-radius: 12px;
    font-weight: 600; font-size: 18px; cursor: pointer;
    transition: transform .2s cubic-bezier(.16,1,.3,1), background .2s ease, box-shadow .2s ease;
  }
  .target:hover { transform: translateY(-2px) scale(1.02); background: #5563ee; box-shadow: 0 12px 28px -10px rgba(108,124,255,.6); }
</style></head>
<body><main class="frame">
  <h1>Hover the button</h1>
  <p class="muted">Smooth 200ms scale + lift on hover.</p>
  <button class="target" id="hover-me">Hover me</button>
</main></body></html>
