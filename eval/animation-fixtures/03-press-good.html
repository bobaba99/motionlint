<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Press feedback — good</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  .pressable {
    display: inline-block; padding: 16px 28px; margin-top: 40px;
    background: var(--accent); color: #fff; border-radius: 12px;
    font-weight: 600; font-size: 18px; cursor: pointer; border: 0;
    transition: transform .12s ease-out, box-shadow .12s ease-out;
    box-shadow: 0 4px 10px -4px rgba(0,0,0,.4);
  }
  .pressable:active {
    transform: scale(.97);
    box-shadow: 0 1px 2px -1px rgba(0,0,0,.4);
    transition-duration: 60ms;
  }
</style></head>
<body><main class="frame">
  <h1>Press feedback</h1>
  <p class="muted">100ms scale to 0.97 on :active, springs back smoothly.</p>
  <button class="pressable" id="press-me">Click me</button>
</main></body></html>
