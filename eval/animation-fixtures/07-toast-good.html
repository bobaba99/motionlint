<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Toast — good</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translate(-50%, 80px); opacity: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px; color: var(--text);
    transition: opacity .25s ease-out, transform .25s cubic-bezier(.16,1,.3,1);
    pointer-events: none;
  }
  .toast.in { transform: translate(-50%, 0); opacity: 1; }
</style></head>
<body><main class="frame">
  <h1>Toast / snackbar</h1>
  <p class="muted">Slides up from below + fades in. After 2s it slides back down + out.</p>
  <button class="btn" id="show">Show toast</button>
  <div class="toast" id="t">Saved successfully</div>
  <script>
    const t = document.getElementById('t');
    document.getElementById('show').addEventListener('click', () => {
      t.classList.add('in');
      setTimeout(() => t.classList.remove('in'), 2000);
    });
  </script>
</main></body></html>
