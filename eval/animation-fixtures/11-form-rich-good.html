<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Form rich feedback — good (multi-animation)</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  /* MULTI-ANIMATION (good): focus ring fade + button press scale + loading spinner + success card slide-in. */
  form { max-width: 460px; margin-top: 24px; }
  .field { margin-bottom: 14px; }
  input { transition: border-color .15s ease-in, box-shadow .15s ease-in, background .15s ease-in; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,124,255,.18); background: var(--bg); }
  .btn { transition: transform .12s ease-out, background .15s ease-out; }
  .btn:active { transform: scale(.97); transition-duration: 60ms; }
  .spinner { display: none; width: 18px; height: 18px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
  .btn.loading .spinner { display: inline-block; }
  .btn.loading .label { opacity: .5; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success {
    margin-top: 14px; max-width: 460px;
    background: rgba(41,230,196,.12); border: 1px solid rgba(41,230,196,.3); border-radius: 10px; padding: 14px 18px;
    color: var(--accent-2); font-weight: 600;
    opacity: 0; transform: translateY(12px);
    transition: opacity .35s cubic-bezier(.16,1,.3,1), transform .35s cubic-bezier(.16,1,.3,1);
  }
  .success.in { opacity: 1; transform: translateY(0); }
</style></head>
<body><main class="frame">
  <h1>Sign up</h1>
  <p class="muted">Focus rings fade in. Submit press scales. Spinner runs. Success slides in.</p>
  <form id="f">
    <div class="field"><label>Name</label><input id="name" placeholder="Ada"></div>
    <div class="field"><label>Email</label><input id="email" placeholder="ada@example.com" type="email"></div>
    <button class="btn" type="submit"><span class="spinner"></span><span class="label">Create account</span></button>
  </form>
  <div class="success" id="s">✓ Account created — check your email.</div>
  <script>
    const f = document.getElementById('f'), btn = f.querySelector('button'), s = document.getElementById('s');
    f.addEventListener('submit', (e) => {
      e.preventDefault();
      btn.classList.add('loading');
      setTimeout(() => { btn.classList.remove('loading'); s.classList.add('in'); }, 900);
    });
  </script>
</main></body></html>
