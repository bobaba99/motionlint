<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Modal entrance — good</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .25s ease-out; }
  .backdrop.open { opacity: 1; pointer-events: auto; }
  .modal {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -40%) scale(.95);
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 28px; min-width: 380px; opacity: 0; pointer-events: none;
    transition: opacity .25s cubic-bezier(.16,1,.3,1), transform .25s cubic-bezier(.16,1,.3,1);
  }
  .modal.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
</style></head>
<body><main class="frame">
  <h1>Modal entrance</h1>
  <p class="muted">Modal slides up from -40% to centred, fades in over 250ms.</p>
  <button class="btn" id="open">Open modal</button>
  <div class="backdrop" id="bd"></div>
  <div class="modal" id="m">
    <h2 style="margin-top:0">Confirm</h2>
    <p>Are you sure you want to proceed?</p>
    <div class="row" style="justify-content:flex-end">
      <button class="btn btn-secondary" id="cancel">Cancel</button>
      <button class="btn">Confirm</button>
    </div>
  </div>
  <script>
    const open = document.getElementById('open'); const m = document.getElementById('m'); const bd = document.getElementById('bd'); const cancel = document.getElementById('cancel');
    open.addEventListener('click', () => { m.classList.add('open'); bd.classList.add('open'); });
    cancel.addEventListener('click', () => { m.classList.remove('open'); bd.classList.remove('open'); });
    bd.addEventListener('click', () => { m.classList.remove('open'); bd.classList.remove('open'); });
  </script>
</main></body></html>
