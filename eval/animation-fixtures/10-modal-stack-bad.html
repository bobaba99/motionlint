<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Modal with stagger — partially broken (multi-animation)</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  /* MULTI-ANIMATION (partial): backdrop fade ✓ kept. modal slide+fade ✓ kept.
     Inner content stagger ✗ children all snap to final state simultaneously. */
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .25s ease-out; }
  .backdrop.open { opacity: 1; pointer-events: auto; }
  .modal {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -40%) scale(.95);
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 28px; min-width: 460px; max-width: 90vw; opacity: 0; pointer-events: none;
    transition: opacity .25s cubic-bezier(.16,1,.3,1), transform .25s cubic-bezier(.16,1,.3,1);
  }
  .modal.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
  /* SEEDED FAULT: no stagger on inner children — they appear together with the modal. */
</style></head>
<body><main class="frame">
  <h1>Stacked entrance modal</h1>
  <p class="muted">Modal entrance OK, but inner children all appear simultaneously (no stagger).</p>
  <button class="btn" id="open">Open modal</button>
  <div class="backdrop" id="bd"></div>
  <div class="modal" id="m">
    <h2 style="margin-top:0">Confirm changes</h2>
    <p>Review your settings before saving them.</p>
    <ul style="padding-left: 18px; margin: 0;"><li>Notifications: on</li><li>Theme: dark</li><li>Locale: en-US</li></ul>
    <div class="row" style="justify-content:flex-end; margin-top: 14px;">
      <button class="btn btn-secondary" id="cancel">Cancel</button>
      <button class="btn">Save</button>
    </div>
  </div>
  <script>
    const o = document.getElementById('open'), m = document.getElementById('m'), bd = document.getElementById('bd'), c = document.getElementById('cancel');
    o.addEventListener('click', () => { m.classList.add('open'); bd.classList.add('open'); });
    c.addEventListener('click', () => { m.classList.remove('open'); bd.classList.remove('open'); });
    bd.addEventListener('click', () => { m.classList.remove('open'); bd.classList.remove('open'); });
  </script>
</main></body></html>
