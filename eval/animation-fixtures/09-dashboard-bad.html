<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Dashboard reveal — partially broken (multi-animation)</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  /* MULTI-ANIMATION (partial): tile stagger ✓ kept. counter ramps ✗ snap to value. chart bars ✗ no animation.
     The LLM should flag the missing animations but NOT the working tile stagger. */
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 24px; }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px;
    opacity: 0; transform: translateY(16px);
    animation: rise .55s cubic-bezier(.16,1,.3,1) forwards;
  }
  .kpi:nth-child(1) { animation-delay: 0ms; }
  .kpi:nth-child(2) { animation-delay: 100ms; }
  .kpi:nth-child(3) { animation-delay: 200ms; }
  .kpi .l { color: var(--dim); font-size: 12.5px; text-transform: uppercase; letter-spacing: .12em; }
  .kpi .v { font-size: 32px; font-weight: 700; margin: 6px 0 4px; }
  .chart { margin-top: 24px; height: 180px; display: flex; align-items: flex-end; gap: 16px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  /* SEEDED FAULT: bars at full height, no rise animation. */
  .bar { flex: 1; background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-radius: 6px 6px 0 0; }
  .bar:nth-child(1) { height: 70%; }
  .bar:nth-child(2) { height: 90%; }
  .bar:nth-child(3) { height: 50%; }
  .bar:nth-child(4) { height: 80%; }
  .bar:nth-child(5) { height: 65%; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
</style></head>
<body><main class="frame">
  <h1>Operations dashboard</h1>
  <p class="muted">Tile stagger works; counter snap; bars don't rise.</p>
  <div class="kpis">
    <div class="kpi"><div class="l">Reviews</div><div class="v">248</div></div>
    <div class="kpi"><div class="l">Score</div><div class="v">92</div></div>
    <div class="kpi"><div class="l">MRR</div><div class="v">$14,820</div></div>
  </div>
  <div class="chart">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
</main></body></html>
