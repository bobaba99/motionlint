<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Form rich feedback — partially broken (multi-animation)</title>
<link rel="stylesheet" href="/anim/_base.css">
<style>
  /* MULTI-ANIMATION (partial): focus ring ✓ kept. Press feedback ✗ no :active.
     Loading ✗ no spinner. Success card ✗ no animation, just appears. */
  form { max-width: 460px; margin-top: 24px; }
  .field { margin-bottom: 14px; }
  input { transition: border-color .15s ease-in, box-shadow .15s ease-in; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,124,255,.18); }
  /* SEEDED: no :active state on btn, no spinner inside, no slide on success */
  .success {
    margin-top: 14px; max-width: 460px; display: none;
    background: rgba(41,230,196,.12); border: 1px solid rgba(41,230,196,.3); border-radius: 10px; padding: 14px 18px;
    color: var(--accent-2); font-weight: 600;
  }
  .success.in { display: block; }
</style></head>
<body><main class="frame">
  <h1>Sign up</h1>
  <p class="muted">Focus works; press doesn't; no spinner; success card pops in.</p>
  <form id="f">
    <div class="field"><label>Name</label><input id="name" placeholder="Ada"></div>
    <div class="field"><label>Email</label><input id="email" placeholder="ada@example.com" type="email"></div>
    <button class="btn" type="submit">Create account</button>
  </form>
  <div class="success" id="s">✓ Account created — check your email.</div>
  <script>
    const f = document.getElementById('f'), s = document.getElementById('s');
    f.addEventListener('submit', (e) => {
      e.preventDefault();
      // No spinner. Wait, then snap success in.
      setTimeout(() => { s.classList.add('in'); }, 900);
    });
  </script>
</main></body></html>
