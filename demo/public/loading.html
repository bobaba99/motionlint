<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading states — Aurora</title>
<link rel="stylesheet" href="/styles.css">
<script src="/_partials.js"></script>
<script type="module" src="/anim.js"></script>
</head>
<body>
<div data-nav></div>

<main class="container" style="padding: 64px 0 40px;">
  <div class="center" style="text-align:center;">
    <span class="eyebrow" data-reveal><span class="dot"></span> empty & loading</span>
    <h1 class="hero-title" data-reveal style="font-size:clamp(28px,4vw,44px);margin:18px auto 12px;">Skeletons that don’t feel skeletal.</h1>
    <p class="lead" data-reveal style="margin:0 auto 36px;">Animated placeholders with shimmer, then a soft cross-fade to real content.</p>
  </div>

  <div class="features" data-auto-animate>
    <div class="feature" data-skeleton-swap data-real='<div class="icon">★</div><h3>Spring lists</h3><p>List inserts and removes ease with a soft spring instead of cutting.</p>'>
      <div class="skeleton sk-line" style="width: 40px; height: 40px; border-radius: 10px; margin-bottom: 14px;"></div>
      <div class="skeleton sk-line" style="width: 40%;"></div>
      <div class="skeleton sk-line" style="width: 90%;"></div>
      <div class="skeleton sk-line" style="width: 80%;"></div>
    </div>
    <div class="feature" data-skeleton-swap data-real='<div class="icon">↺</div><h3>Optimistic updates</h3><p>Render the success state immediately and roll back only on failure.</p>'>
      <div class="skeleton sk-line" style="width: 40px; height: 40px; border-radius: 10px; margin-bottom: 14px;"></div>
      <div class="skeleton sk-line" style="width: 50%;"></div>
      <div class="skeleton sk-line" style="width: 95%;"></div>
      <div class="skeleton sk-line" style="width: 70%;"></div>
    </div>
    <div class="feature" data-skeleton-swap data-real='<div class="icon">◢</div><h3>Progressive reveal</h3><p>Stream in fields as they arrive — no all-or-nothing flash of content.</p>'>
      <div class="skeleton sk-line" style="width: 40px; height: 40px; border-radius: 10px; margin-bottom: 14px;"></div>
      <div class="skeleton sk-line" style="width: 35%;"></div>
      <div class="skeleton sk-line" style="width: 88%;"></div>
      <div class="skeleton sk-line" style="width: 72%;"></div>
    </div>
  </div>

  <section class="section">
    <div class="center">
      <h2>Inbox skeleton</h2>
      <p class="muted">Common inbox-style list. Use this to verify line-height, density, and tap targets on mobile.</p>
    </div>
    <div class="sk-card">
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
        <div class="skeleton sk-avatar"></div>
        <div style="flex:1;">
          <div class="skeleton sk-line" style="width: 35%;"></div>
          <div class="skeleton sk-line" style="width: 70%;"></div>
        </div>
      </div>
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
        <div class="skeleton sk-avatar"></div>
        <div style="flex:1;">
          <div class="skeleton sk-line" style="width: 50%;"></div>
          <div class="skeleton sk-line" style="width: 90%;"></div>
        </div>
      </div>
      <div style="display:flex;gap:14px;align-items:center;">
        <div class="skeleton sk-avatar"></div>
        <div style="flex:1;">
          <div class="skeleton sk-line" style="width: 40%;"></div>
          <div class="skeleton sk-line" style="width: 60%;"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<div data-footer></div>
</body>
</html>
